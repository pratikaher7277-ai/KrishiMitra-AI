<!DOCTYPE html>

<html>

<head>

<title>MarketMitra AI</title>

<style>

body{
background:#f5fff7;
font-family:Arial;
padding:40px;
}

.box{

max-width:800px;

margin:auto;

background:white;

padding:100px;

border-radius:20px;

}

h1{

color:#166534;

margin-bottom:10px;

}

.sub{

color:#666;

margin-bottom:30px;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

input,
select{

width:80%;

padding:15px;

border-radius:10px;

border:1px solid #ddd;

}

button{

margin-top:25px;

padding:15px;

width:100%;

background:#15803d;

color:white;

border:none;

border-radius:12px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="box">

<h1>

📈 MarketMitra AI

</h1>

<p class="sub">

Get smarter selling recommendations

</p>

<form action="/market-result">

<div class="grid">

<div>

<label>

Crop Name

</label>

<input
name="crop"
required>

</div>


<div>

<label>

District

</label>

<input
name="district"
required>

</div>


<div>

<label>

Quantity (Quintal)

</label>

<input
name="qty"
required>

</div>


<div>

<label>

Crop Grade

</label>

<select
name="grade">

<option>

A

</option>

<option>

B

</option>

<option>

C

</option>

</select>

</div>

</div>


<button>

Get Market Analysis

</button>

</form>

</div>

</body>

</html>
