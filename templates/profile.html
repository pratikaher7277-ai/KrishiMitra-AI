<!DOCTYPE html>
<html>

<head>
<title>Farmer Profile</title>

<style>

body{
font-family:Arial;
background:#f5fff7;
padding:40px;
}

.box{
max-width:800px;
margin:auto;
background:white;
padding:35px;
border-radius:20px;
}

h1{
color:#166534;
}

.card{
margin-top:20px;
padding:18px;
background:#f7fff8;
border-radius:14px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#166534;
color:white;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
}

button:hover{
background:#15803d;
}

.back-link {
display: inline-block;
margin-bottom: 15px;
color: #166534;
text-decoration: none;
font-weight: bold;
}

</style>

</head>

<body>

<div class="box">

<a href="/" class="back-link">← Back to Dashboard</a>

<h1>👨‍🌾 Farmer Profile</h1>

<div class="card">

<form method="POST" action="/profile">

<label>Farmer Name</label>
<input type="text" name="farmer_name" placeholder="Enter Name" value="{{ session.get('farmer_name', '') }}" required>

<label>Village / District</label>
<input type="text" name="location" placeholder="Enter Village" value="{{ session.get('location', '') }}" required>

<label>State</label>
<input type="text" placeholder="Enter State">

<label>Crop</label>
<input type="text" placeholder="Current Crop">

<label>Farm Area (Acres)</label>
<input type="number">

<label>Preferred Language</label>
<select>
<option>English</option>
<option>Hindi</option>
<option>Marathi</option>
</select>

<button type="submit">
Save Profile
</button>

</form>

</div>

<div class="card">

<h3>📊 Farmer Dashboard</h3>

<p>Registered Crops → 0</p>

<p>Disease Scans → 0</p>

<p>Market Searches → 0</p>

<p>Weather Alerts → Enabled</p>

</div>

</div>

</body>

</html>
